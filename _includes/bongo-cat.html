<!-- Decorative auto-tapping Bongo Cat, pinned to the bottom-right corner.
     Reuses the transparent sprite art from github.com/Externalizable/bongo.cat
     (CC) at its original 800x450 stage coordinates, scaled down. The paw images
     are 1600x900 sprite sheets: x 0 = paw up, x -800 = paw down; y 0 = dark-line
     (light theme), y -450 = light-line (dark theme). -->
<div class="bongocat" aria-hidden="true">
  <div class="bongocat__stage">
    <div class="bongocat__layer bongocat__cat bongocat__head"></div>
    <div class="bongocat__layer bongocat__bongo"></div>
    <div class="bongocat__layer bongocat__cat bongocat__paw bongocat__paw--left"></div>
    <div class="bongocat__layer bongocat__cat bongocat__paw bongocat__paw--right"></div>
  </div>
</div>

<style>
  .bongocat {
    position: fixed;
    right: 1rem;
    bottom: 1rem;
    width: 220px;
    height: 124px;
    z-index: 1000;
    pointer-events: none;
  }
  .bongocat__stage {
    position: absolute;
    top: 0;
    left: 0;
    width: 800px;
    height: 450px;
    transform: scale(0.275);
    transform-origin: top left;
  }
  .bongocat__layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 800px;
    height: 450px;
    background-repeat: no-repeat;
    background-position-x: 0;
    background-position-y: 0;
  }
  .bongocat__head   { background-image: url("{{ '/images/bongocat/cat.png'       | relative_url }}"); z-index: 1; }
  .bongocat__bongo  { background-image: url("{{ '/images/bongocat/bongo.png'     | relative_url }}"); z-index: 2; }
  .bongocat__paw--left  { background-image: url("{{ '/images/bongocat/paw-left.png'  | relative_url }}"); z-index: 3; animation: bongocat-left 0.6s infinite; }
  .bongocat__paw--right { background-image: url("{{ '/images/bongocat/paw-right.png' | relative_url }}"); z-index: 3; animation: bongocat-right 0.6s infinite; }

  /* Dark theme: show the white-line version (lower half of each cat sprite). */
  html[data-theme="dark"] .bongocat__cat { background-position-y: -450px; }

  @keyframes bongocat-left {
    0%, 49.99% { background-position-x: 0; }      /* paw up */
    50%, 100%  { background-position-x: -800px; } /* paw down */
  }
  @keyframes bongocat-right {
    0%, 49.99% { background-position-x: -800px; } /* paw down */
    50%, 100%  { background-position-x: 0; }      /* paw up */
  }

  @media (prefers-reduced-motion: reduce) {
    .bongocat__paw { animation: none; }
  }
  @media only screen and (max-width: 600px) {
    .bongocat { width: 150px; height: 84px; }
    .bongocat__stage { transform: scale(0.1875); }
  }
</style>
